{% extends 'base.html' %}
{% block title %}Giriş Yap – Mini Shop{% endblock %}

{% block content %}
<div class="auth-box">
  <h2>👋 Hoş Geldin!</h2>
  <p class="subtitle">Hesabına giriş yap</p>

  <form method="POST">
    <div class="form-group">
      <label>Kullanıcı Adı</label>
      <input type="text" name="username" placeholder="kullanici_adi" required autofocus />
    </div>
    <div class="form-group">
      <label>Şifre</label>
      <input type="password" name="password" placeholder="••••••••" required />
    </div>
    <button type="submit" class="btn btn-primary btn-block">
      🔑 Giriş Yap
    </button>
  </form>

  <div class="auth-footer">
    Hesabın yok mu? <a href="{{ url_for('register') }}">Kayıt Ol</a>
  </div>
</div>
{% endblock %}
